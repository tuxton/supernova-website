<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" role="img" aria-label="Ser Supernova">
  <!-- SVG wrapper that displays the book cover with rounded corners so /icon.svg matches the cover style -->
  <defs>
    <clipPath id="round">
      <rect x="0" y="0" width="180" height="180" rx="28" ry="28" />
    </clipPath>
  </defs>
  <rect width="180" height="180" fill="#fff" />
  <g clip-path="url(#round)">
    <image href="/images/book-cover.png" width="180" height="180" preserveAspectRatio="xMidYMid slice" />
  </g>
</svg>